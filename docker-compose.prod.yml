name: askari-patrol

services:
  server:
    image: ghcr.io/kiraboibrahim/askari-patrol-mcp-server:${ASKARI_VERSION:-latest}
    ports:
      - "4000:8000"
    env_file:
      - .env
    volumes:
      - askari_logs:/app/logs
      - askari_data:/app/data
    restart: unless-stopped

  whatsapp:
    image: ghcr.io/kiraboibrahim/askari-patrol-mcp-server:${ASKARI_VERSION:-latest}
    ports:
      - "4001:8001"
    command: uv run python -m askari_patrol_client.whatsapp_client
    env_file:
      - .env
    environment:
      # Override MCP_SERVER_URL to use Docker's internal DNS (not localhost)
      MCP_SERVER_URL: http://server:8000/mcp
    volumes:
      - askari_logs:/app/logs
      - askari_data:/app/data
    restart: unless-stopped
    depends_on:
      - server

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dozzle_users.yml:/data/users.yml
    ports:
      - "4002:8080"
    restart: unless-stopped
    environment:
      - DOZZLE_FILTER=label=com.docker.compose.project=askari-patrol
      - DOZZLE_AUTH_PROVIDER=simple

volumes:
  askari_logs:
    driver: local
  askari_data:
    driver: local
